<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modular Character Engine – Scene Player</title>
  <link rel="stylesheet" href="./styles/character-base.css" />
  <link rel="stylesheet" href="./styles/heads.css" />
  <link rel="stylesheet" href="./styles/torsos.css" />
  <link rel="stylesheet" href="./styles/arms.css" />
  <link rel="stylesheet" href="./styles/legs.css" />
  <link rel="stylesheet" href="./styles/rollerblades.css" />
  <link rel="stylesheet" href="./styles/meet-scene.css" />
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    import { MeetScene } from "./scenes/MeetScene.js";

    const app = document.getElementById("app");

    const scene = new MeetScene();
    const sceneElement = scene.load();

    app.appendChild(sceneElement);
  </script>
</body>
</html>

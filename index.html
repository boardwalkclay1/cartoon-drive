<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Love Drive Cartoon</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ========== GLOBAL DIALOG BUBBLES ========== */
.dialog {
  position: absolute;
  max-width: 220px;
  padding: 10px 14px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.dialog::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 20px;
  border-width: 10px 10px 0 10px;
  border-style: solid;
  border-color: #ffffff transparent transparent transparent;
}

/* ========== SCENE 1: MEETING ========== */
#scene1 {
  position: absolute;
  inset: 0;
  background: linear-gradient(#87CEEB, #6BCB5C);
  overflow: hidden;
}

/* Background hills */
.hill {
  position: absolute;
  bottom: 160px;
  width: 400px;
  height: 200px;
  background: #3f8f3f;
  border-radius: 50%;
  opacity: 0.8;
}
.hill.h1 { left: -80px; }
.hill.h2 { left: 220px; }
.hill.h3 { right: -120px; }

/* Ground */
#ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: #4CAF50;
}

/* Characters */
.character {
  position: absolute;
  bottom: 200px;
  width: 100px;
  height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: walk 0.9s infinite;
}

/* Head */
.head {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  position: relative;
}

/* Face */
.eye {
  position: absolute;
  top: 24px;
  width: 8px;
  height: 8px;
  background: #000;
  border-radius: 50%;
}
.eye.left { left: 18px; }
.eye.right { right: 18px; }

.brow {
  position: absolute;
  top: 16px;
  width: 16px;
  height: 3px;
  background: #000;
  border-radius: 3px;
}
.brow.left { left: 14px; }
.brow.right { right: 14px; }

.mouth {
  position: absolute;
  bottom: 14px;
  left: 50%;
  width: 24px;
  height: 12px;
  border-radius: 0 0 20px 20px;
  border-bottom: 3px solid #000;
  transform: translateX(-50%);
}

/* Hair */
.hair {
  position: absolute;
  top: -4px;
  left: 50%;
  width: 76px;
  height: 44px;
  background: #111;
  border-radius: 40px;
  transform: translateX(-50%);
}

/* Body */
.body {
  width: 56px;
  height: 84px;
  border-radius: 14px;
  margin-top: 6px;
}

/* Arms */
.arms {
  width: 80px;
  height: 60px;
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
}
.arm {
  width: 18px;
  height: 60px;
  border-radius: 12px;
  transform-origin: top center;
  animation: armSwing 0.9s infinite;
}

/* Legs */
.legs {
  width: 56px;
  height: 64px;
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}
.leg {
  width: 22px;
  height: 64px;
  border-radius: 12px;
}

/* Man styling */
#man .head { background: #2a1b0e; }
#man .body { background: #1b3b7a; }
#man .leg { background: #111; }
#man .arm { background: #2a1b0e; }

/* Woman styling */
#woman .head { background: #3a2615; }
#woman .hair { background: #1a1010; height: 54px; }
#woman .body { background: #b03060; }
#woman .leg { background: #222; }
#woman .arm { background: #3a2615; }

/* Walk + arm swing */
@keyframes walk {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}
@keyframes armSwing {
  0%   { transform: rotate(12deg); }
  50%  { transform: rotate(-18deg); }
  100% { transform: rotate(12deg); }
}

/* Hearts + kiss */
#hearts {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 32px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#kiss {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* Car in scene 1 */
#car1 {
  position: absolute;
  bottom: 190px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 140px;
  background: #222;
  border-radius: 30px;
  display: none;
}
#car1::before, #car1::after {
  content: "";
  position: absolute;
  bottom: -30px;
  width: 80px;
  height: 80px;
  background: #111;
  border-radius: 50%;
}
#car1::before { left: 30px; }
#car1::after { right: 30px; }
#car1 .window {
  position: absolute;
  top: 20px;
  left: 40px;
  width: 240px;
  height: 60px;
  background: #87a9d8;
  border-radius: 20px;
}

/* ========== SCENE 2: CAR INTERIOR ========== */
#carInterior {
  position: absolute;
  inset: 0;
  background: #111;
  display: none;
}

/* Dashboard */
.dashboard {
  position: absolute;
  bottom: 140px;
  width: 100%;
  height: 130px;
  background: #333;
}

/* Steering wheel */
.steeringWheel {
  position: absolute;
  bottom: 170px;
  left: 50%;
  width: 150px;
  height: 150px;
  background: #000;
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 0 8px #222;
}

/* Driver + passenger heads */
.driver, .passenger {
  position: absolute;
  bottom: 210px;
}
.driver { left: 38%; }
.passenger { right: 38%; }

.driver .head, .passenger .head {
  width: 70px;
  height: 70px;
}

/* Hands on wheel */
.handOnWheel {
  position: absolute;
  bottom: 190px;
  left: 50%;
  width: 22px;
  height: 70px;
  background: #2a1b0e;
  border-radius: 12px;
  transform: translateX(-50%) rotate(18deg);
  transform-origin: top center;
}
.passengerHand {
  position: absolute;
  bottom: 190px;
  right: 40%;
  width: 22px;
  height: 60px;
  background: #3a2615;
  border-radius: 12px;
  transform-origin: top center;
  transform: rotate(-10deg);
}

/* Interior dialog */
#dialogInterior {
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
}

/* ========== SCENE 3: DRIVING BACK VIEW ========== */
#scene3 {
  position: absolute;
  inset: 0;
  background: #87CEEB;
  display: none;
  overflow: hidden;
}

/* Clouds */
.cloud {
  position: absolute;
  top: 40px;
  width: 140px;
  height: 70px;
  background: white;
  border-radius: 40px;
  opacity: 0.85;
  animation: cloudMove 28s linear infinite;
}
.cloud::before, .cloud::after {
  content: "";
  position: absolute;
  background: white;
  width: 90px;
  height: 55px;
  border-radius: 40px;
}
.cloud::before { top: -20px; left: 10px; }
.cloud::after { top: 10px; left: 60px; }

@keyframes cloudMove {
  0% { left: 110%; }
  100% { left: -180px; }
}

/* City + hills parallax */
.layerCity {
  position: absolute;
  bottom: 220px;
  width: 200%;
  height: 120px;
  background:
    linear-gradient(#2f3b4a 0, #2f3b4a 40px, transparent 40px),
    repeating-linear-gradient(
      to right,
      #2f3b4a 0px,
      #2f3b4a 40px,
      #44556b 40px,
      #44556b 80px
    );
  opacity: 0.9;
  animation: cityMove 10s linear infinite;
}
@keyframes cityMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.layerHills {
  position: absolute;
  bottom: 200px;
  width: 200%;
  height: 180px;
  background: radial-gradient(circle at 10% 0, #3f8f3f 0, #3f8f3f 40%, transparent 40%),
              radial-gradient(circle at 40% 0, #3f8f3f 0, #3f8f3f 40%, transparent 40%),
              radial-gradient(circle at 80% 0, #3f8f3f 0, #3f8f3f 40%, transparent 40%);
  opacity: 0.8;
  animation: hillsMove 16s linear infinite;
}
@keyframes hillsMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Moving road */
#road {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 220px;
  background: repeating-linear-gradient(
    to bottom,
    #333 0px,
    #333 90px,
    #444 90px,
    #444 180px
  );
  animation: roadMove 0.8s linear infinite;
}
@keyframes roadMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Lane markings */
#lane {
  position: absolute;
  bottom: 110px;
  width: 200%;
  height: 10px;
  background: repeating-linear-gradient(
    to right,
    #f5f5f5 0px,
    #f5f5f5 60px,
    transparent 60px,
    transparent 120px
  );
  opacity: 0.9;
  animation: laneMove 0.8s linear infinite;
}
@keyframes laneMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Back-view car */
#carBack {
  position: absolute;
  bottom: 140px;
  left: 50%;
  width: 260px;
  height: 150px;
  background: #222;
  border-radius: 30px;
  transform: translateX(-50%);
  animation: carBounce 0.7s ease-in-out infinite;
}
#carBack::before, #carBack::after {
  content: "";
  position: absolute;
  bottom: -30px;
  width: 80px;
  height: 80px;
  background: #111;
  border-radius: 50%;
}
#carBack::before { left: 30px; }
#carBack::after { right: 30px; }

/* Rear window */
#carBack .rear-window {
  position: absolute;
  top: 20px;
  left: 40px;
  width: 180px;
  height: 70px;
  background: #6f8fb8;
  border-radius: 20px;
}

/* Tail lights */
.tail {
  position: absolute;
  bottom: 20px;
  width: 30px;
  height: 20px;
  background: #ff4444;
}
.tail.left { left: 20px; }
.tail.right { right: 20px; }

/* Car bounce (camera shake feel) */
@keyframes carBounce {
  0% { transform: translate(-50%, 0); }
  50% { transform: translate(-50%, -4px); }
  100% { transform: translate(-50%, 0); }
}

/* Hearts while driving */
#driveHearts {
  position: absolute;
  bottom: 260px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  opacity: 0;
  transition: opacity 0.6s ease;
}

/* Fade overlay */
#fadeOverlay {
  position: absolute;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease;
}
</style>
</head>
<body>

<!-- ========== SCENE 1: MEETING ========== -->
<div id="scene1">
  <div class="hill h1"></div>
  <div class="hill h2"></div>
  <div class="hill h3"></div>
  <div id="ground"></div>

  <div id="man" class="character" style="left:-180px;">
    <div class="head">
      <div class="hair"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="mouth"></div>
    </div>
    <div class="body"></div>
    <div class="arms">
      <div class="arm left"></div>
      <div class="arm right"></div>
    </div>
    <div class="legs">
      <div class="leg"></div>
      <div class="leg"></div>
    </div>
  </div>

  <div id="woman" class="character" style="right:-180px;">
    <div class="head">
      <div class="hair"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="mouth"></div>
    </div>
    <div class="body"></div>
    <div class="arms">
      <div class="arm left"></div>
      <div class="arm right"></div>
    </div>
    <div class="legs">
      <div class="leg"></div>
      <div class="leg"></div>
    </div>
  </div>

  <div id="car1">
    <div class="window"></div>
  </div>

  <div id="hearts">❤️ ❤️ ❤️</div>
  <div id="kiss">💋</div>

  <div id="dialogMan" class="dialog" style="bottom: 340px; left: 20%;">
    You look even better in person.
  </div>
  <div id="dialogWoman" class="dialog" style="bottom: 340px; right: 20%;">
    I’m glad you came. Let’s ride.
  </div>
</div>

<!-- ========== SCENE 2: CAR INTERIOR ========== -->
<div id="carInterior">
  <div class="dashboard"></div>
  <div class="steeringWheel"></div>

  <div class="driver">
    <div class="head" style="background:#2a1b0e;">
      <div class="hair"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="mouth"></div>
    </div>
  </div>

  <div class="passenger">
    <div class="head" style="background:#3a2615;">
      <div class="hair"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="mouth"></div>
    </div>
  </div>

  <div class="handOnWheel"></div>
  <div class="passengerHand"></div>

  <div id="dialogInterior" class="dialog">
    You ready?  
    <br><strong>Always.</strong>
  </div>
</div>

<!-- ========== SCENE 3: DRIVING BACK VIEW ========== -->
<div id="scene3">
  <div class="cloud" style="left:10%; animation-delay:0s;"></div>
  <div class="cloud" style="left:50%; animation-delay:6s;"></div>
  <div class="cloud" style="left:80%; animation-delay:12s;"></div>

  <div class="layerCity"></div>
  <div class="layerHills"></div>

  <div id="carBack">
    <div class="rear-window"></div>
    <div class="tail left"></div>
    <div class="tail right"></div>
  </div>

  <div id="road"></div>
  <div id="lane"></div>

  <div id="driveHearts">💖</div>
</div>

<div id="fadeOverlay"></div>

<script>
// ====== ELEMENTS ======
const man = document.getElementById("man");
const woman = document.getElementById("woman");
const car1 = document.getElementById("car1");
const scene1 = document.getElementById("scene1");
const carInterior = document.getElementById("carInterior");
const scene3 = document.getElementById("scene3");
const hearts = document.getElementById("hearts");
const kiss = document.getElementById("kiss");
const dialogMan = document.getElementById("dialogMan");
const dialogWoman = document.getElementById("dialogWoman");
const dialogInterior = document.getElementById("dialogInterior");
const driveHearts = document.getElementById("driveHearts");
const fadeOverlay = document.getElementById("fadeOverlay");

let manX = -180;
let womanX = -180;

// ====== SCENE 1: WALK IN ======
const meetInterval = setInterval(() => {
  manX += 2;
  womanX += 2;

  man.style.left = manX + "px";
  woman.style.right = womanX + "px";

  if (manX >= window.innerWidth / 2 - 280) {
    clearInterval(meetInterval);

    // Show dialogue
    setTimeout(() => {
      dialogMan.style.opacity = 1;
      setTimeout(() => {
        dialogWoman.style.opacity = 1;

        // Hearts
        setTimeout(() => {
          hearts.style.opacity = 1;

          // Kiss
          setTimeout(() => {
            kiss.style.opacity = 1;

            // Fade hearts + kiss + dialog
            setTimeout(() => {
              hearts.style.opacity = 0;
              kiss.style.opacity = 0;
              dialogMan.style.opacity = 0;
              dialogWoman.style.opacity = 0;

              // Walk them toward car
              man.style.animation = "none";
              woman.style.animation = "none";

              let stepToCar = 0;
              const toCarInterval = setInterval(() => {
                stepToCar++;
                manX += 1.5;
                womanX += 1.5;
                man.style.left = manX + "px";
                woman.style.right = womanX + "px";
                man.style.bottom = 200 - stepToCar * 0.4 + "px";
                woman.style.bottom = 200 - stepToCar * 0.4 + "px";

                if (stepToCar > 40) {
                  clearInterval(toCarInterval);

                  setTimeout(() => {
                    man.style.display = "none";
                    woman.style.display = "none";
                    car1.style.display = "block";

                    // Switch to interior
                    setTimeout(() => {
                      scene1.style.display = "none";
                      carInterior.style.display = "block";

                      // Interior dialog
                      setTimeout(() => {
                        dialogInterior.style.opacity = 1;

                        // Then switch to back-view driving
                        setTimeout(() => {
                          dialogInterior.style.opacity = 0;
                          carInterior.style.display = "none";
                          scene3.style.display = "block";

                          // Hearts while driving
                          setTimeout(() => {
                            driveHearts.style.opacity = 1;
                            setTimeout(() => {
                              driveHearts.style.opacity = 0;
                            }, 2500);
                          }, 1500);

                          // Fade out at end
                          setTimeout(() => {
                            fadeOverlay.style.opacity = 1;
                          }, 9000);

                        }, 2600);
                      }, 600);

                    }, 1200);
                  }, 400);
                }
              }, 30);
            }, 900);
          }, 900);
        }, 900);
      }, 900);
    }, 600);
  }
}, 12);
</script>

</body>
</html>

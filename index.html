<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Love Drive Cartoon</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, sans-serif;
}

/* ========== GLOBAL DIALOG BUBBLES ========== */
.dialog {
  position: absolute;
  max-width: 220px;
  padding: 10px 14px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.dialog::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 20px;
  border-width: 10px 10px 0 10px;
  border-style: solid;
  border-color: #ffffff transparent transparent transparent;
}

/* ========== SCENE 1: MEETING ========== */
#scene1 {
  position: absolute;
  inset: 0;
  background: linear-gradient(#87CEEB, #6BCB5C);
  overflow: hidden;
}

/* Background hills */
.hill {
  position: absolute;
  bottom: 160px;
  width: 400px;
  height: 200px;
  background: #3f8f3f;
  border-radius: 50%;
  opacity: 0.8;
}
.hill.h1 { left: -80px; }
.hill.h2 { left: 220px; }
.hill.h3 { right: -120px; }

/* Ground */
#ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: #4CAF50;
}

/* Characters */
.character {
  position: absolute;
  bottom: 200px;
  width: 100px;
  height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: walk 0.9s infinite;
}

/* Head */
.head {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  position: relative;
}

/* Textured Afro */
.afro {
  position: absolute;
  top: -18px;
  left: 50%;
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, #1a1010 40%, #000 100%);
  border-radius: 50%;
  transform: translateX(-50%);
  filter: blur(1px);
}

/* Face */
.eye {
  position: absolute;
  top: 24px;
  width: 8px;
  height: 8px;
  background: #000;
  border-radius: 50%;
}
.eye.left { left: 18px; }
.eye.right { right: 18px; }

.brow {
  position: absolute;
  top: 16px;
  width: 16px;
  height: 3px;
  background: #000;
  border-radius: 3px;
}
.brow.left { left: 14px; }
.brow.right { right: 14px; }

.mouth {
  position: absolute;
  bottom: 14px;
  left: 50%;
  width: 24px;
  height: 12px;
  border-radius: 0 0 20px 20px;
  border-bottom: 3px solid #000;
  transform: translateX(-50%);
}

/* Body */
.body {
  width: 56px;
  height: 84px;
  border-radius: 14px;
  margin-top: 6px;
}

/* Arms */
.arms {
  width: 80px;
  height: 60px;
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
}
.arm {
  width: 18px;
  height: 60px;
  border-radius: 12px;
  transform-origin: top center;
  animation: armSwing 0.9s infinite;
}

/* Legs */
.legs {
  width: 56px;
  height: 64px;
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}
.leg {
  width: 22px;
  height: 64px;
  border-radius: 12px;
}

/* Man styling */
#man .head { background: #2a1b0e; }
#man .body { background: #1b3b7a; }
#man .leg { background: #111; }
#man .arm { background: #2a1b0e; }

/* Woman styling */
#woman .head { background: #3a2615; }
#woman .body { background: #b03060; }
#woman .leg { background: #222; }
#woman .arm { background: #3a2615; }

/* Walk + arm swing */
@keyframes walk {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}
@keyframes armSwing {
  0%   { transform: rotate(12deg); }
  50%  { transform: rotate(-18deg); }
  100% { transform: rotate(12deg); }
}

/* Hearts + kiss */
#hearts, #kiss {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.5s ease;
}
#hearts { top: 30%; font-size: 32px; }
#kiss { top: 42%; font-size: 26px; }

/* Car in scene 1 */
#car1 {
  position: absolute;
  bottom: 190px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 140px;
  background: #222;
  border-radius: 30px;
  display: none;
}
#car1::before, #car1::after {
  content: "";
  position: absolute;
  bottom: -30px;
  width: 80px;
  height: 80px;
  background: #111;
  border-radius: 50%;
}
#car1::before { left: 30px; }
#car1::after { right: 30px; }
#car1 .window {
  position: absolute;
  top: 20px;
  left: 40px;
  width: 240px;
  height: 60px;
  background: #87a9d8;
  border-radius: 20px;
}

/* ========== SCENE 2: CAR INTERIOR ========== */
#carInterior {
  position: absolute;
  inset: 0;
  background: #111;
  display: none;
}

/* Dashboard */
.dashboard {
  position: absolute;
  bottom: 140px;
  width: 100%;
  height: 130px;
  background: #333;
}

/* Steering wheel */
.steeringWheel {
  position: absolute;
  bottom: 170px;
  left: 50%;
  width: 150px;
  height: 150px;
  background: #000;
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 0 8px #222;
}

/* Driver + passenger heads */
.driver, .passenger {
  position: absolute;
  bottom: 210px;
}
.driver { left: 38%; }
.passenger { right: 38%; }

/* Bald boy */
.driver .head {
  background: #2a1b0e;
}

/* Afro girl */
.passenger .head {
  background: #3a2615;
}
.passenger .head .afro {
  top: -22px;
  width: 100px;
  height: 100px;
}

/* Hands */
.handOnWheel {
  position: absolute;
  bottom: 190px;
  left: 50%;
  width: 22px;
  height: 70px;
  background: #2a1b0e;
  border-radius: 12px;
  transform: translateX(-50%) rotate(18deg);
  transform-origin: top center;
}
.passengerHand {
  position: absolute;
  bottom: 190px;
  right: 40%;
  width: 22px;
  height: 60px;
  background: #3a2615;
  border-radius: 12px;
  transform-origin: top center;
  transform: rotate(-10deg);
}

/* Interior dialog */
#dialogInterior {
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
}

/* ========== SCENE 3: DRIVING BACK VIEW ========== */
#scene3 {
  position: absolute;
  inset: 0;
  background: #87CEEB;
  display: none;
  overflow: hidden;
}

/* Clouds */
.cloud {
  position: absolute;
  top: 40px;
  width: 140px;
  height: 70px;
  background: white;
  border-radius: 40px;
  opacity: 0.85;
  animation: cloudMove 28s linear infinite;
}
.cloud::before, .cloud::after {
  content: "";
  position: absolute;
  background: white;
  width: 90px;
  height: 55px;
  border-radius: 40px;
}
.cloud::before { top: -20px; left: 10px; }
.cloud::after { top: 10px; left: 60px; }

@keyframes cloudMove {
  0% { left: 110%; }
  100% { left: -180px; }
}

/* City + hills parallax */
.layerCity {
  position: absolute;
  bottom: 220px;
  width: 200%;
  height: 120px;
  background:
    linear-gradient(#2f3b4a 0, #2f3b4a 40px, transparent 40px),
    repeating-linear-gradient(
      to right,
      #2f3b4a 0px,
      #2f3b4a 40px,
      #44556b 40px,
      #44556b 80px
    );
  opacity: 0.9;
  animation: cityMove 10s linear infinite;
}
@keyframes cityMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.layerHills {
  position: absolute;
  bottom: 200px;
  width: 200%;
  height: 180px;
  background: radial-gradient(circle at 10% 0, #3f8f3f 0, #3f8f3f 40%, transparent 40%),
              radial-gradient(circle at 40% 0, #3f8f3f 0, #3f8f3f 40%, transparent 40%),
              radial-gradient(circle at 80% 0, #3f8f3f 0, #3f8f3f 40%, transparent 40%);
  opacity: 0.8;
  animation: hillsMove 16s linear infinite;
}
@keyframes hillsMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Moving road */
#road {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 220px;
  background: repeating-linear-gradient(
    to bottom,
    #333 0px,
    #333 90px,
    #444 90px,
    #444 180px
  );
  animation: roadMove 0.8s linear infinite;
}
@keyframes roadMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Lane markings */
#lane {
  position: absolute;
  bottom: 110px;
  width: 200%;
  height: 10px;
  background: repeating-linear-gradient(
    to right,
    #f5f5f5 0px,
    #f5f5f5 60px,
    transparent 60px,
    transparent 120px
  );
  opacity: 0.9;
  animation: laneMove 0.8s linear infinite;
}
@keyframes laneMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Back-view car */
#carBack {
  position: absolute;
  bottom: 140px;
  left: 50%;
  width: 260px;
  height: 150px;
  background: #222;
  border-radius: 30px;
  transform: translateX(-50%);
  animation: carBounce 0.7s ease-in-out infinite;
}
#carBack::before, #carBack::after {
  content: "";
  position: absolute;
  bottom: -30px;
  width: 80px;
  height: 80px;
  background: #111;
  border-radius: 50%;
}
#carBack::before { left: 30px; }
#carBack::after { right: 30px; }

/* Rear window */
#carBack .rear-window {
  position: absolute;
  top: 20px;
  left: 40px;
  width: 180px;
  height: 70px;
  background: #6f8fb8;
  border-radius: 20px;
}

/* Tail lights */
.tail {
  position: absolute;
  bottom: 20px;
  width: 30px;
  height: 20px;
  background: #ff4444;
}
.tail.left { left: 20px; }
.tail.right { right: 20px; }

/* Car bounce */
@keyframes carBounce {
  0% { transform: translate(-50%, 0); }
  50% { transform: translate(-50%, -4px); }
  100% { transform: translate(-50%, 0); }
}

/* Hearts while driving */
#driveHearts {
  position: absolute;
  bottom: 260px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  opacity: 0;
  transition: opacity 0.6s ease;
}

/* Fade overlay */
#fadeOverlay {
  position: absolute;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease;
}
</style>
</head>
<body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Love Drive – Detailed Characters</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ========== SCENE WRAPPERS ========== */
.scene {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

/* ========== SCENE 1: STREET MEET ========== */
#scene1 {
  background: linear-gradient(#87CEEB, #6BCB5C);
}

/* Ground */
#ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: #4CAF50;
}

/* Simple buildings */
.building {
  position: absolute;
  bottom: 200px;
  width: 120px;
  background: #2f3b4a;
  border-radius: 4px 4px 0 0;
}
.building.b1 { left: 10%; height: 180px; }
.building.b2 { left: 40%; height: 220px; }
.building.b3 { right: 15%; height: 200px; }

/* Characters base */
.character {
  position: absolute;
  bottom: 200px;
  width: 110px;
  height: 260px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Head */
.head {
  position: relative;
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

/* Skin tones */
.skin-dark {
  background: #2a1b0e;
}
.skin-medium {
  background: #3a2615;
}

/* Textured afro */
.afro {
  position: absolute;
  top: -22px;
  left: 50%;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle at 30% 30%, #2b1a16 0, #0b0504 60%, #000 100%);
  border-radius: 50%;
  transform: translateX(-50%);
  filter: blur(0.5px);
}

/* Facial features */
.eye {
  position: absolute;
  top: 28px;
  width: 9px;
  height: 9px;
  background: #000;
  border-radius: 50%;
}
.eye.left { left: 18px; }
.eye.right { right: 18px; }

.brow {
  position: absolute;
  top: 20px;
  width: 18px;
  height: 3px;
  background: #000;
  border-radius: 3px;
}
.brow.left { left: 14px; }
.brow.right { right: 14px; }

.nose {
  position: absolute;
  top: 34px;
  left: 50%;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border-bottom: 3px solid #000;
  transform: translateX(-50%);
}

.mouth {
  position: absolute;
  bottom: 14px;
  left: 50%;
  width: 26px;
  height: 14px;
  border-radius: 0 0 20px 20px;
  border-bottom: 3px solid #000;
  transform: translateX(-50%);
}

/* Body */
.body {
  width: 60px;
  height: 90px;
  border-radius: 16px;
  margin-top: 8px;
}

/* Arms */
.arms {
  width: 90px;
  height: 70px;
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}
.arm {
  width: 20px;
  height: 70px;
  border-radius: 14px;
  transform-origin: top center;
  animation: armSwing 0.9s infinite;
}

/* Hands */
.hand {
  position: absolute;
  bottom: -6px;
  left: 50%;
  width: 18px;
  height: 18px;
  background: inherit;
  border-radius: 50%;
  transform: translateX(-50%);
}

/* Legs */
.legs {
  width: 60px;
  height: 80px;
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
}
.leg {
  width: 24px;
  height: 80px;
  border-radius: 14px;
}

/* Man styling */
#man .head { /* bald, no hair */ }
#man .body { background: #1b3b7a; }
#man .arm, #man .leg { background: #2a1b0e; }

/* Woman styling */
#woman .body { background: #b03060; }
#woman .arm, #woman .leg { background: #3a2615; }

/* Walk animation */
@keyframes walk {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}
@keyframes armSwing {
  0%   { transform: rotate(12deg); }
  50%  { transform: rotate(-18deg); }
  100% { transform: rotate(12deg); }
}

/* Hearts */
#hearts {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 34px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* ========== SCENE 2: CAR INTERIOR ========== */
#scene2 {
  background: radial-gradient(circle at top, #444 0, #111 55%);
  display: none;
}

/* Dashboard */
.dashboard {
  position: absolute;
  bottom: 150px;
  width: 100%;
  height: 140px;
  background: #222;
}

/* Windshield view (moving road outside) */
.windshield {
  position: absolute;
  top: 60px;
  left: 50%;
  width: 70%;
  height: 120px;
  background: #6fa9e8;
  border-radius: 20px;
  transform: translateX(-50%);
  overflow: hidden;
  box-shadow: 0 0 0 6px #333;
}

/* Road outside */
.roadOutside {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 60px;
  background: repeating-linear-gradient(
    to bottom,
    #333 0px,
    #333 30px,
    #444 30px,
    #444 60px
  );
  animation: roadMove 0.8s linear infinite;
}
.laneOutside {
  position: absolute;
  bottom: 30px;
  width: 200%;
  height: 6px;
  background: repeating-linear-gradient(
    to right,
    #f5f5f5 0px,
    #f5f5f5 40px,
    transparent 40px,
    transparent 80px
  );
  animation: roadMove 0.8s linear infinite;
}
@keyframes roadMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Steering wheel */
.steeringWheel {
  position: absolute;
  bottom: 170px;
  left: 50%;
  width: 160px;
  height: 160px;
  background: #000;
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 0 8px #333;
}

/* Driver + passenger heads (closer) */
.driver, .passenger {
  position: absolute;
  bottom: 210px;
}
.driver { left: 32%; }
.passenger { right: 32%; }

/* Interior heads reuse same style */
.driver .head, .passenger .head {
  width: 80px;
  height: 80px;
}

/* Afro in interior */
.passenger .afro {
  top: -26px;
  width: 110px;
  height: 110px;
}

/* Hands on wheel */
.handOnWheelLeft, .handOnWheelRight {
  position: absolute;
  bottom: 190px;
  width: 22px;
  height: 70px;
  background: #2a1b0e;
  border-radius: 14px;
  transform-origin: top center;
}
.handOnWheelLeft {
  left: 50%;
  transform: translateX(-70px) rotate(18deg);
}
.handOnWheelRight {
  left: 50%;
  transform: translateX(50px) rotate(-18deg);
}

/* Passenger hand */
.passengerHand {
  position: absolute;
  bottom: 190px;
  right: 34%;
  width: 22px;
  height: 60px;
  background: #3a2615;
  border-radius: 14px;
  transform-origin: top center;
  transform: rotate(-10deg);
}

/* Interior dialog */
#dialogInterior {
  position: absolute;
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
  max-width: 260px;
  padding: 10px 14px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#dialogInterior::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 10px 10px 0 10px;
  border-style: solid;
  border-color: #ffffff transparent transparent transparent;
}

/* Car bounce (camera feel) */
#scene2CarWrapper {
  position: absolute;
  inset: 0;
  animation: carBounce 0.7s ease-in-out infinite;
}
@keyframes carBounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ========== SCENE 1: STREET MEET ========== -->
<div id="scene1" class="scene">
  <div id="ground"></div>
  <div class="building b1"></div>
  <div class="building b2"></div>
  <div class="building b3"></div>

  <!-- Man (bald) -->
  <div id="man" class="character" style="left:-160px; animation: walk 0.9s infinite;">
    <div class="head skin-dark">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
    <div class="body" style="background:#1b3b7a;"></div>
    <div class="arms">
      <div class="arm skin-dark">
        <div class="hand"></div>
      </div>
      <div class="arm skin-dark">
        <div class="hand"></div>
      </div>
    </div>
    <div class="legs">
      <div class="leg skin-dark"></div>
      <div class="leg skin-dark"></div>
    </div>
  </div>

  <!-- Woman (textured afro) -->
  <div id="woman" class="character" style="right:-160px; animation: walk 0.9s infinite;">
    <div class="head skin-medium">
      <div class="afro"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
    <div class="body" style="background:#b03060;"></div>
    <div class="arms">
      <div class="arm skin-medium">
        <div class="hand"></div>
      </div>
      <div class="arm skin-medium">
        <div class="hand"></div>
      </div>
    </div>
    <div class="legs">
      <div class="leg skin-medium"></div>
      <div class="leg skin-medium"></div>
    </div>
  </div>

  <div id="hearts">❤️ ❤️ ❤️</div>
</div>

<!-- ========== SCENE 2: CAR INTERIOR ========== -->
<div id="scene2" class="scene">
  <div id="scene2CarWrapper">
    <div class="windshield">
      <div class="roadOutside"></div>
      <div class="laneOutside"></div>
    </div>

    <div class="dashboard"></div>
    <div class="steeringWheel"></div>

    <!-- Driver (bald) -->
    <div class="driver">
      <div class="head skin-dark">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="brow left"></div>
        <div class="brow right"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
      </div>
    </div>

    <!-- Passenger (afro) -->
    <div class="passenger">
      <div class="head skin-medium">
        <div class="afro"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="brow left"></div>
        <div class="brow right"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
      </div>
    </div>

    <!-- Hands -->
    <div class="handOnWheelLeft"></div>
    <div class="handOnWheelRight"></div>
    <div class="passengerHand"></div>

    <div id="dialogInterior">
      You know this feels like the start of something.
      <br><strong>Yeah… keep driving.</strong>
    </div>
  </div>
</div>

<script>
// ====== ELEMENTS ======
const man = document.getElementById("man");
const woman = document.getElementById("woman");
const scene1 = document.getElementById("scene1");
const scene2 = document.getElementById("scene2");
const hearts = document.getElementById("hearts");
const dialogInterior = document.getElementById("dialogInterior");

let manX = -160;
let womanX = -160;

// ====== SCENE 1: WALK TOWARD EACH OTHER ======
const meetInterval = setInterval(() => {
  manX += 2;
  womanX += 2;

  man.style.left = manX + "px";
  woman.style.right = womanX + "px";

  // When they reach near center
  if (manX >= window.innerWidth / 2 - 260) {
    clearInterval(meetInterval);

    // Stop walk animation
    man.style.animation = "none";
    woman.style.animation = "none";

    // Show hearts
    setTimeout(() => {
      hearts.style.opacity = 1;

      // Hold the moment
      setTimeout(() => {
        hearts.style.opacity = 0;

        // Transition to car interior
        setTimeout(() => {
          scene1.style.display = "none";
          scene2.style.display = "block";

          // Show interior dialog
          setTimeout(() => {
            dialogInterior.style.opacity = 1;
          }, 800);

        }, 600);
      }, 1500);
    }, 500);
  }
}, 12);
</script>

</body>
</html>

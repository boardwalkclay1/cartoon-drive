<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Scene Test – Fixed Attachments</title>
  <style>
    body { margin: 0; overflow: hidden; background: #87CEEB; }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(#87CEEB, #6BCB5C);
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200px;
      background: #4CAF50;
    }

    .character {
      position: absolute;
      bottom: 200px;
      width: 140px;
      height: 320px;
      transition: 2s ease-out;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADS */
    .male-head-bald, .female-head {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
    }

    .male-head-bald { background: #2a1b0e; }
    .female-head { background: #3a2615; }

    /* AFRO OVERLAY */
    .afro-overlay {
      position: absolute;
      top: -30px;
      left: 50%;
      width: 130px;
      height: 130px;
      background: radial-gradient(circle, #1a1010 0%, #000 100%);
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    /* BODY GROUP (TORSO + ARMS) */
    .body-group {
      position: relative;
      width: 100px;
      height: 140px;
      margin-top: -10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TORSOS */
    .male-torso, .female-torso {
      width: 70px;
      height: 100px;
      border-radius: 16px;
      margin-top: 10px;
      z-index: 1;
    }

    .male-torso { background: #1b3b7a; }
    .female-torso { background: #b03060; }

    /* ARMS */
    .arms {
      position: absolute;
      top: 20px;
      width: 120px;
      height: 80px;
      display: flex;
      justify-content: space-between;
      z-index: 0;
    }

    .arms div {
      width: 24px;
      height: 80px;
      border-radius: 14px;
    }

    .male-arms div { background: #2a1b0e; }
    .female-arms div { background: #3a2615; }

    /* LEGS */
    .legs {
      width: 80px;
      height: 100px;
      margin-top: -5px;
      display: flex;
      justify-content: space-between;
    }

    .male-legs-jeans div {
      width: 30px;
      height: 100px;
      background: #1f1f1f;
      border-radius: 14px;
    }

    .female-legs-shorts div {
      width: 30px;
      height: 100px;
      background: #3a2615;
      border-radius: 14px;
    }

    /* ROLLERBLADES */
    .rollerblades {
      width: 100px;
      height: 40px;
      background: #222;
      border-radius: 10px;
      margin-top: -10px;
      position: relative;
    }

    .rollerblades div {
      position: absolute;
      bottom: -12px;
      width: 22px;
      height: 22px;
      background: #111;
      border-radius: 50%;
    }

    .w1 { left: 4px; }
    .w2 { left: 32px; }
    .w3 { left: 60px; }
    .w4 { left: 88px; }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    // --- Character Builder ---
    function CharacterBuilder(parts) {
      const wrapper = document.createElement("div");
      wrapper.className = "character";

      // HEAD
      const head = document.createElement("div");
      head.className = parts.head.className;

      // AFRO (if needed)
      if (parts.head.afro) {
        const afro = document.createElement("div");
        afro.className = "afro-overlay";
        head.appendChild(afro);
      }

      wrapper.appendChild(head);

      // BODY GROUP (TORSO + ARMS)
      const bodyGroup = document.createElement("div");
      bodyGroup.className = "body-group";

      const torso = document.createElement("div");
      torso.className = parts.torso.className;
      bodyGroup.appendChild(torso);

      const arms = document.createElement("div");
      arms.className = parts.arms.className + " arms";
      arms.innerHTML = "<div></div><div></div>";
      bodyGroup.appendChild(arms);

      wrapper.appendChild(bodyGroup);

      // LEGS
      const legs = document.createElement("div");
      legs.className = parts.legs.className + " legs";
      legs.innerHTML = "<div></div><div></div>";
      wrapper.appendChild(legs);

      // SKATES
      const skates = document.createElement("div");
      skates.className = "rollerblades";
      skates.innerHTML = `
        <div class="w1"></div>
        <div class="w2"></div>
        <div class="w3"></div>
        <div class="w4"></div>
      `;
      wrapper.appendChild(skates);

      return wrapper;
    }

    // --- Character Modules ---
    const MaleHeadBald = { className: "male-head-bald" };
    const FemaleHeadAfro = { className: "female-head", afro: true };

    const MaleTorso = { className: "male-torso" };
    const FemaleTorso = { className: "female-torso" };

    const MaleArms = { className: "male-arms" };
    const FemaleArms = { className: "female-arms" };

    const MaleLegsJeans = { className: "male-legs-jeans" };
    const FemaleLegsShorts = { className: "female-legs-shorts" };

    const Rollerblades = { className: "rollerblades" };

    // --- Characters ---
    const SkaterGuy = CharacterBuilder({
      head: MaleHeadBald,
      torso: MaleTorso,
      arms: MaleArms,
      legs: MaleLegsJeans,
      skates: Rollerblades
    });

    const SkaterGirl = CharacterBuilder({
      head: FemaleHeadAfro,
      torso: FemaleTorso,
      arms: FemaleArms,
      legs: FemaleLegsShorts,
      skates: Rollerblades
    });

    // --- Scene ---
    const scene = document.createElement("div");
    scene.className = "scene";

    const ground = document.createElement("div");
    ground.className = "ground";
    scene.appendChild(ground);

    SkaterGuy.style.left = "-200px";
    SkaterGirl.style.right = "-200px";

    scene.appendChild(SkaterGuy);
    scene.appendChild(SkaterGirl);

    document.getElementById("app").appendChild(scene);

    // --- Animation ---
    setTimeout(() => {
      SkaterGuy.style.left = "40%";
      SkaterGirl.style.right = "40%";
    }, 200);
  </script>
</body>
</html>
